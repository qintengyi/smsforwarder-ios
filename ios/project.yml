name: SmsForwarder
options:
  bundleIdPrefix: io.smsforwarder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  SmsForwarder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/SmsForwarder
        excludes:
          - "Info.plist"
          - "Assets.xcassets"
    resources:
      - path: Sources/SmsForwarder/Assets.xcassets
    info:
      path: Sources/SmsForwarder/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.smsforwarder.app
        PRODUCT_NAME: SmsForwarder
        MARKETING_VERSION: "1.3"
        CURRENT_PROJECT_VERSION: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
